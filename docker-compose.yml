services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: thassa
      POSTGRES_PASSWORD: thassa
      POSTGRES_DB: thassa
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thassa"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for local dev.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: thassa
      MINIO_ROOT_PASSWORD: thassa-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # Creates the default bucket on startup.
  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 thassa thassa-secret) do echo waiting; sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/thassa-assets;
      /usr/bin/mc anonymous set download local/thassa-assets;
      exit 0;
      "

  # Local dev chain (contracts + MockUSD deployed by the contracts scripts).
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"

volumes:
  dbdata:
  miniodata:

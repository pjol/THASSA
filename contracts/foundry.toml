[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Allows the deploy script to write the machine-readable manifest (out/deployment.env).
fs_permissions = [{ access = "read-write", path = "./out" }]
# Required to keep ThassaMarkets/ThassaHub under the EIP-170 runtime size limit.
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
